services:
  postgres:
    image: postgres:17
    container_name: datingapp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: datingapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:8
    container_name: datingapp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: datingapp
    volumes:
      - mongodb_data:/data/db

  sonarqube:
    image: sonarqube:latest
    container_name: datingapp-sonarqube
    restart: unless-stopped
    ports:
      - "9001:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  postgres_data:
  mongodb_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
