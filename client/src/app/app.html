<div class="card bg-base-100 w-1/2 mx-auto p-10 mt-10 shadow-xl">
  <h3 class="text-3xl font-bold text-red-500 mb-6">{{title}}</h3>
  <div class="space-y-4">
    @for (user of users(); track user.id) {
    <div class="flex items-center gap-4 pb-4 border-b border-gray-200">
      <img src="/user.png" alt="user avatar" class="size-12 rounded-full">
      <div class="flex-1">
        <p class="font-semibold text-gray-800">{{user.displayname}}</p>
      </div>
    </div>
    }
  </div>
</div>
